name: Monthly OsmAnd Fetch and Translate

on:
  schedule:
    # רץ פעם בחודש, ב-28 בחודש בשעה 00:00 UTC
    - cron: '0 0 28 * *'
  workflow_dispatch:
    # מאפשר הפעלה ידנית לצורכי בדיקה בכל עת

permissions:
  contents: write

jobs:
  build-and-translate:
    runs-on: ubuntu-latest

    steps:
    # 1. שליפת הקוד מהמאגר
    - name: Checkout repository
      uses: actions/checkout@v4

    # 2. הגדרת סביבת Python
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.10'

    # 3. התקנת תלויות (כולל גרסת ה-alpha של googletrans הפותרת באגים נפוצים)
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install beautifulsoup4 googletrans==3.1.0a0

    # 4. הורדת קובץ המקור מהשרת של OsmAnd
    - name: Fetch list.html
      run: |
        curl -s "https://download.osmand.net/list.php" -o list.html

    # 5. הרצת סקריפט העיבוד והתרגום
    - name: Run Python script
      run: |
        python update_list.py

    # 6. בדיקה אם נוצר קובץ JSON חדש או מעודכן וביצוע Commit & Push
    - name: Commit and push changes
      run: |
        git config --local user.email "github-actions[bot]@users.noreply.github.com"
        git config --local user.name "github-actions[bot]"
        git add list.json
        # נבדוק אם יש שינויים בקובץ ה-JSON
        if ! git diff --cached --exit-code; then
          git commit -m "Automated monthly update of translated list.json [skip ci]"
          git push
        else
          echo "No changes detected in list.json"
        fi
